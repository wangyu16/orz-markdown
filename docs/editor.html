<!DOCTYPE html>
<html lang="en" data-chrome="light" data-view="split">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>orz Markdown editor</title>
<meta name="description" content="A simple, elegant Markdown editor that renders with orz-markdown. Installable, offline, registers as a .md handler.">
<link rel="canonical" href="https://markdown.orz.how/editor.html">
<meta name="robots" content="index,follow,max-image-preview:large">
<meta property="og:type" content="website">
<meta property="og:site_name" content="orz-markdown">
<meta property="og:title" content="orz Markdown editor">
<meta property="og:description" content="Write Markdown in an installable, offline editor with a live orz-markdown preview.">
<meta property="og:url" content="https://markdown.orz.how/editor.html">
<meta property="og:image" content="https://markdown.orz.how/media/orz-markdown-social.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#5f9e44">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<style>
  :root {
    --bar:#fff; --bar-fg:#2a2a2e; --line:#e7e7e0; --btn:#f3f3ed; --btn-fg:#42424a; --btn-hov:#e9e9e1;
    --accent:#2e6db5; --ed-bg:#fff; --pv-bg:#ecece7; --muted:#8a8a93; --seg:#eeeee8; --shadow:0 1px 2px rgba(0,0,0,.05);
  }
  html[data-chrome="dark"] {
    --bar:#1d2026; --bar-fg:#d6dae2; --line:#2c3038; --btn:#2a2e37; --btn-fg:#c2c8d2; --btn-hov:#343a45;
    --accent:#5b9bf0; --ed-bg:#1a1c21; --pv-bg:#14161a; --muted:#79808c; --seg:#23272f; --shadow:none;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { display:flex; flex-direction:column; font:15px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif; color:var(--bar-fg); background:var(--pv-bg); }

  /* ---- toolbar ---- */
  #bar { flex:0 0 auto; display:flex; align-items:center; gap:5px; padding:8px 12px; background:var(--bar);
    border-bottom:1px solid var(--line); }
  #bar .logo { display:flex; align-items:center; margin-right:2px; }
  #bar .logo img { height:25px; width:auto; display:block; }
  #bar .gh { display:inline-flex; align-items:center; justify-content:center; width:30px; height:32px; border-radius:9px;
    color:var(--btn-fg); opacity:.5; transition:opacity .12s,background .12s; margin-right:4px; }
  #bar .gh:hover { opacity:1; background:var(--btn-hov); }
  #bar .gh svg { width:17px; height:17px; fill:currentColor; }
  .ico { display:inline-flex; align-items:center; justify-content:center; width:34px; height:32px; border:0;
    border-radius:9px; background:transparent; color:var(--btn-fg); cursor:pointer; transition:background .12s,color .12s; }
  .ico:hover { background:var(--btn-hov); }
  .ico svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
  .ico.accent { background:var(--accent); color:#fff; } .ico.accent:hover { filter:brightness(1.08); }
  .sep { width:1px; height:22px; background:var(--line); margin:0 5px; }
  .seg { display:inline-flex; background:var(--seg); border-radius:9px; padding:2px; gap:2px; }
  .seg .ico { width:32px; height:28px; border-radius:7px; }
  .seg .ico.on { background:var(--bar); color:var(--accent); box-shadow:var(--shadow); }
  .fname { font-size:13px; color:var(--muted); margin-left:8px; max-width:26vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .dot { width:7px; height:7px; border-radius:50%; background:#e0a44a; margin-left:6px; opacity:0; transition:opacity .15s; }
  body[data-dirty="1"] .dot { opacity:1; }
  .sp { flex:1; }
  select.theme { font:inherit; font-size:13px; color:var(--btn-fg); background:var(--btn); border:1px solid var(--line);
    border-radius:9px; padding:6px 9px; cursor:pointer; }
  #b-sync.on { color:var(--accent); }
  .ico.font { font-family:Georgia,"Times New Roman",serif; font-weight:700; width:28px; }
  .ico.font.sm { font-size:12px; } .ico.font.lg { font-size:17px; }
  .fontgrp { display:inline-flex; }
  #update-bar { position:fixed; left:50%; bottom:18px; transform:translateX(-50%) translateY(22px); display:none;
    align-items:center; gap:11px; background:var(--bar); color:var(--bar-fg); border:1px solid var(--line);
    box-shadow:0 10px 34px rgba(0,0,0,.20); padding:9px 11px 9px 16px; border-radius:12px; font-size:13px; z-index:30;
    transition:transform .2s,opacity .2s; opacity:0; }
  #update-bar.show { display:flex; transform:translateX(-50%) translateY(0); opacity:1; }
  #update-bar button { font:inherit; font-size:13px; font-weight:600; border:0; border-radius:8px; padding:7px 12px; cursor:pointer; }
  #update-reload { background:var(--accent); color:#fff; } #update-reload:hover { filter:brightness(1.08); }
  #update-dismiss { background:transparent; color:var(--muted); }

  /* ---- panes ---- */
  #main { flex:1; min-height:0; display:grid; grid-template-columns:1fr 6px 1fr; grid-template-rows:minmax(0,1fr); }
  html[data-view="editor"] #main { grid-template-columns:1fr 0 0; }
  html[data-view="preview"] #main { grid-template-columns:0 0 1fr; }
  #ed { min-width:0; background:var(--ed-bg); }
  #ed .CodeMirror { height:100%; font:14px/1.6 ui-monospace,"SF Mono",Menlo,Consolas,monospace; }
  #split { background:var(--line); cursor:col-resize; }
  #split:hover, body.resizing #split { background:var(--accent); }
  /* while dragging the splitter, let the pointer pass through the iframe so the
     parent keeps receiving mousemove/mouseup (otherwise the drag never releases) */
  body.resizing { cursor:col-resize; user-select:none; }
  /* ---- footer ---- */
  #appfoot { flex:0 0 auto; display:flex; align-items:center; justify-content:center; gap:4px;
    height:24px; font-size:12px; color:var(--muted); background:var(--bar); border-top:1px solid var(--line); }
  #appfoot a { color:var(--muted); text-decoration:none; }
  #appfoot a:hover { color:var(--accent); text-decoration:underline; }
  body.resizing #frame { pointer-events:none; }
  #pv { min-width:0; background:var(--pv-bg); position:relative; }
  #frame { width:100%; height:100%; border:0; display:block; background:transparent; }

  #toast { position:fixed; left:50%; bottom:18px; transform:translateX(-50%) translateY(18px); background:#111; color:#fff;
    padding:8px 15px; border-radius:9px; font-size:13px; opacity:0; transition:opacity .2s,transform .2s; pointer-events:none; z-index:9; }
  #toast.show { opacity:.96; transform:translateX(-50%) translateY(0); }
  @media (max-width:680px){ #main{grid-template-columns:1fr!important;} #split{display:none;}
    html:not([data-view="preview"]) #pv{display:none;} html[data-view="preview"] #ed{display:none;} .fname{display:none;} }
</style>
</head>
<body>
  <div id="bar">
    <a class="logo" href="./" title="orz-markdown"><img src="./orz.svg" alt="orz-markdown"></a>
    <a class="gh" href="https://github.com/wangyu16/orz-markdown" target="_blank" rel="noopener" title="orz-markdown on GitHub"><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg></a>
    <button class="ico" id="b-new" title="New (clear)"><svg viewBox="0 0 24 24"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/><path d="M12 18v-5M9.5 15.5h5"/></svg></button>
    <button class="ico" id="b-open" title="Open a .md file"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></button>
    <button class="ico accent" id="b-save" title="Save (Ctrl/Cmd-S)"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg></button>
    <button class="ico" id="b-saveas" title="Save as…"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5M12 15V3"/></svg></button>
    <span class="fname" id="fname">untitled.md</span><span class="dot"></span>
    <span class="sp"></span>
    <span class="seg" id="seg-view">
      <button class="ico" data-v="editor" title="Editor only"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/></svg></button>
      <button class="ico on" data-v="split" title="Split"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M12 4v16"/></svg></button>
      <button class="ico" data-v="preview" title="Preview only"><svg viewBox="0 0 24 24"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </span>
    <button class="ico" id="b-sync" title="Sync scrolling"><svg viewBox="0 0 24 24"><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 0 1 0 10h-2"/><path d="M8 12h8"/></svg></button>
    <span class="fontgrp">
      <button class="ico font sm" id="b-font-dec" title="Smaller text" aria-label="Decrease text size">A</button>
      <button class="ico font lg" id="b-font-inc" title="Larger text" aria-label="Increase text size">A</button>
    </span>
    <span class="sep"></span>
    <select class="theme" id="b-theme" title="Preview theme"></select>
    <button class="ico" id="b-dark" title="Toggle dark mode"><svg viewBox="0 0 24 24" id="i-dark"></svg></button>
  </div>
  <div id="main">
    <div id="ed"><textarea id="ta" spellcheck="false"></textarea></div>
    <div id="split"></div>
    <div id="pv"><iframe id="frame" title="Preview"></iframe></div>
  </div>
  <footer id="appfoot">© <a href="https://markdown.orz.how" target="_blank" rel="noopener">orz-markdown</a></footer>
  <div id="toast"></div>
  <div id="update-bar">
    <span>A new version of the editor is available.</span>
    <button id="update-reload">Reload</button>
    <button id="update-dismiss">Later</button>
  </div>

<script type="text/markdown" id="welcome">
# orz Markdown — a feature tour

Welcome! This default document renders **every** feature orz Markdown supports.
Edit on the left and the preview updates live. Open a `.md` file (or install this
app and set it as your default `.md` editor) to work on your own documents.

{{toc 2,3}}

## Text

**Bold**, *italic*, ***bold italic***, ~~strikethrough~~, `inline code`,
==highlight==, ++inserted++, super^script^ and sub~script~, and a
[link](https://markdown.orz.how).

> A blockquote can hold **any** Markdown, including lists and code.

## Lists

- Bullet item
  - Nested item
  - Another nested item
- Second item

1. Ordered item
2. Second item
3. Third item

- [x] A completed task
- [ ] A pending task

## Table

| Feature  | Inline | Block |
|:---------|:------:|------:|
| Math     |   ✓    |   ✓   |
| Diagrams |        |   ✓   |
| Themes   |        |   ✓   |

## Code

```js
function greet(name) {
  return `Hello, ${name}!`;
}
```

## Math

Inline math $e^{i\pi} + 1 = 0$, and a display equation:

$$\int_{-\infty}^{\infty} e^{-x^2}\,dx = \sqrt{\pi}$$

Chemistry with mhchem: $\ce{CO2 + H2O -> H2CO3}$

## Plugins

Emoji {{emoji rocket}} {{emoji sparkles}} {{emoji tada}}, colored
{{sp[green] spans}}, and badges {{sp[success] ok}} {{sp[warning] check}} {{sp[danger] stop}}.

A scannable QR code: {{qr https://markdown.orz.how}}

A flowchart:

{{mermaid
graph LR
  Write --> Render --> Share
  Render --> Edit --> Render
}}

A chart:

{{chart
type: bar
labels: Mon, Tue, Wed, Thu
data: 4, 7, 5, 9
}}

Aspirin, drawn from a SMILES string:

{{smiles CC(=O)Oc1ccccc1C(=O)O}}

## Containers

**Info.** A neutral note worth highlighting.
:::

::: success
**Success.** Everything passed.
:::

::: warning
**Warning.** Double-check this part.
:::

::: danger
**Danger.** This action is risky.
:::

**Left column**

Content flows here.
:::
::: col

And here.
:::
::::

:::: tabs

The first tab's content.
:::
::: tab Details
The second tab's content.
:::
::::

A spoiler:

::: spoil Click to reveal
Hidden until you open it.
:::
